# ┌─────────────────────────────────────────────────────────────────────────┐
# │  ⚠️  MEMORY SAFETY WARNING                                              │
# │                                                                         │
# │  MMPM memory lives at  ~/.mmpm/data  on your host (bind-mounted).      │
# │                                                                         │
# │  SAFE   to stop:   docker compose down          (keeps memory)         │
# │  DANGER to stop:   docker compose down -v       (DELETES all memory)   │
# │                                                                         │
# │  The -v flag removes named volumes.  grafana-data will be wiped.       │
# │  ~/.mmpm/data is a bind-mount and survives, BUT if you also delete     │
# │  that directory manually, all atoms are permanently gone.              │
# │                                                                         │
# │  Recovery after data loss:                                             │
# │    npm run restore -- --file memory/project-context.json              │
# │    npm run restore -- --file ~/.mmpm/backups/<latest>.json            │
# └─────────────────────────────────────────────────────────────────────────┘

services:
  mmpm-service:
    build: .
    ports:
      - "3000:3000"
    environment:
      - MMPM_API_KEY=${MMPM_API_KEY:-}
      - MMPM_ATOM_FILE=/app/seeds.json
      - SHARD_COUNT=${SHARD_COUNT:-4}
      # DB lives at ~/.mmpm/data on the host, bind-mounted into the container.
      # This is the same path used by start.sh and the MCP config — all three
      # modes share one DB so memory is never split across locations.
      - DB_BASE_PATH=/app/mmpm-db
      # Bind all interfaces so Docker port-forwarding can reach the server.
      # The server defaults to 127.0.0.1 (S16 hardening) which is correct for
      # bare-metal deployments, but inside a container network isolation comes
      # from Docker itself — the app must listen on 0.0.0.0.
      - HOST=0.0.0.0
    volumes:
      # Bind-mount host ~/.mmpm/data so Docker, start.sh, and MCP all share
      # the same LevelDB files.  ${HOME} is expanded by Docker Compose from
      # the shell environment.  The directory is created automatically below.
      - ${HOME}/.mmpm/data:/app/mmpm-db
      - ./seeds.json:/app/seeds.json:ro
      - ./memory:/app/memory:ro
    networks:
      - mmpm-net
    restart: always
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/ready').then(r=>process.exit(r.status===200?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      mmpm-service:
        condition: service_healthy
    networks:
      - mmpm-net

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      # Explicitly disable anonymous access.
      - GF_AUTH_ANONYMOUS_ENABLED=false
      # Suppress the /api/live/ws 401 log entries that fire on every pre-login
      # browser request. Grafana Live itself stays enabled (needed for Unified
      # Alerting and any future streaming datasources); we just quiet the noise.
      - GF_LOG_FILTERS=context:warn
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      mmpm-service:
        condition: service_healthy
      prometheus:
        condition: service_started
    networks:
      - mmpm-net

  # ── one-shot test runner ─────────────────────────────────────────────────
  # Builds the `test` stage and runs the full vitest suite, then exits.
  # Usage:  docker compose run --rm mmpm-test
  # The test DB lives in a tmpfs mount so it never touches host disk.
  mmpm-test:
    build:
      context: .
      target: test
    environment:
      - NODE_OPTIONS=--max-old-space-size=512
    tmpfs:
      - /app/mmpm-test-container-db
    networks:
      - mmpm-net
    profiles:
      - test

networks:
  mmpm-net:
    driver: bridge

volumes:
  # Grafana dashboard and settings persistence
  grafana-data:
  # Note: mmpm-data named volume removed — DB now lives at ${HOME}/.mmpm/data
  # on the host so all run modes (Docker, start.sh, MCP) share one database.
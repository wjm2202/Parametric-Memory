services:
  mmpm-service:
    build: .
    ports:
      - "3000:3000"
    environment:
      - MMPM_API_KEY=${MMPM_API_KEY:-}
      - MMPM_INITIAL_DATA=${MMPM_INITIAL_DATA:-NodeA,NodeB,NodeC,NodeD,NodeE,NodeF}
      # Optional: point to a mounted JSON seed file instead of MMPM_INITIAL_DATA.
      # The file must contain a flat JSON array of atom strings:
      #   ["atom1", "atom2", ...]
      # Seed file takes precedence over MMPM_INITIAL_DATA when set.
      - MMPM_ATOM_FILE=${MMPM_ATOM_FILE:-}
      - SHARD_COUNT=${SHARD_COUNT:-4}
      - DB_BASE_PATH=${DB_BASE_PATH:-/app/mmpm-db}
    volumes:
      # This maps the internal DB folder to a persistent Docker volume
      - mmpm-data:/app/mmpm-db
      # Uncomment and set MMPM_ATOM_FILE=/app/atoms.json to seed from a file:
      # - ./atoms.json:/app/atoms.json:ro
    networks:
      - mmpm-net
    restart: always
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/ready').then(r=>process.exit(r.status===200?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      mmpm-service:
        condition: service_healthy
    networks:
      - mmpm-net

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      # Explicitly disable anonymous access.
      - GF_AUTH_ANONYMOUS_ENABLED=false
      # Suppress the /api/live/ws 401 log entries that fire on every pre-login
      # browser request. Grafana Live itself stays enabled (needed for Unified
      # Alerting and any future streaming datasources); we just quiet the noise.
      - GF_LOG_FILTERS=context:warn
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      mmpm-service:
        condition: service_healthy
      prometheus:
        condition: service_started
    networks:
      - mmpm-net

  # ── one-shot test runner ─────────────────────────────────────────────────
  # Builds the `test` stage and runs the full vitest suite, then exits.
  # Usage:  docker compose run --rm mmpm-test
  # The test DB lives in a tmpfs mount so it never touches host disk.
  mmpm-test:
    build:
      context: .
      target: test
    environment:
      - NODE_OPTIONS=--max-old-space-size=512
    tmpfs:
      - /app/mmpm-test-container-db
    networks:
      - mmpm-net
    profiles:
      - test

networks:
  mmpm-net:
    driver: bridge

volumes:
  # LevelDB persistence for the MMPM service
  mmpm-data:
  # Grafana dashboard and settings persistence
  grafana-data:
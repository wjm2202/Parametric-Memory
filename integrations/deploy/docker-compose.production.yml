# ── MMPM Production Stack ─────────────────────────────────────────────────────
#
# Deploy with:
#   docker compose -f integrations/deploy/docker-compose.production.yml up -d
#
# Prerequisites:
#   1. DNS A record pointing to this server
#   2. Initial cert: certbot certonly --standalone -d ocean.parametric-memory.dev
#   3. .env.production in repo root with MMPM_API_KEY and MMPM_MCP_AUTH_KEY
#
# ── MEMORY SAFETY WARNING ────────────────────────────────────────────────────
#   SAFE:    docker compose down          (keeps memory)
#   DANGER:  docker compose down -v       (DELETES all memory volumes!)
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── MMPM data server (HTTP API, port 3000 internal) ──────────────────────
  # All env vars are sourced from .env.production (generated by setup-droplet.sh).
  # The env_file directive passes every var; individual overrides below ensure
  # container-specific values (HOST, DB_BASE_PATH, MMPM_ATOM_FILE) are correct
  # regardless of what's in the env file.
  mmpm-service:
    build:
      context: ../../
      dockerfile: Dockerfile
    expose:
      - "3000"
    env_file:
      - ../../.env.production
    environment:
      # Container-specific overrides (these take precedence over env_file)
      HOST: "0.0.0.0"
      DB_BASE_PATH: /app/mmpm-db
      MMPM_ATOM_FILE: /app/seeds.json
      MODEL2VEC_VOCAB_PATH: /app/data/model2vec_vocab.bin
    volumes:
      - mmpm-data:/app/mmpm-db
      - ../../seeds.json:/app/seeds.json:ro
      - ../../memory:/app/memory:ro
      # Model2Vec vocabulary — bind-mount from host. Server auto-detects.
      # Prefers .bin (10× faster load); falls back to .json then n-gram embeddings.
      # Docker will create empty dirs for missing files — server handles gracefully.
      - ../../data:/app/data:ro
    networks:
      - mmpm-net
    restart: always
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/ready').then(r=>process.exit(r.status===200?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  # ── MCP HTTP server (Streamable HTTP transport, port 3001 internal) ──────
  mmpm-mcp:
    build:
      context: ../../
      dockerfile: Dockerfile.mcp
    expose:
      - "3001"
    env_file:
      - ../../.env.production
    environment:
      # MCP-specific overrides
      # MMPM_API_KEY and MMPM_MCP_AUTH_KEY come from env_file above.
      # Do NOT re-declare them here — docker compose interpolates ${VAR} from
      # the host shell (not from env_file), which overwrites with blank strings.
      MMPM_MCP_BASE_URL: "http://mmpm-service:3000"
      MMPM_MCP_ENABLE_MUTATIONS: "1"
      MMPM_MCP_ENABLE_SEMANTIC_TOOLS: "1"
      MCP_PORT: "3001"
      MCP_HOST: "0.0.0.0"
    depends_on:
      mmpm-service:
        condition: service_healthy
    networks:
      - mmpm-net
    restart: always

  # ── nginx TLS reverse proxy ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.production.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/lib/letsencrypt:/var/lib/letsencrypt
    depends_on:
      - mmpm-service
      - mmpm-mcp
    networks:
      - mmpm-net
    restart: always

  # ── Let's Encrypt auto-renewal ──────────────────────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/lib/letsencrypt:/var/lib/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/lib/letsencrypt --quiet; sleep 12h & wait $${!}; done'"
    depends_on:
      - nginx

volumes:
  mmpm-data:

networks:
  mmpm-net:
    driver: bridge

# ── MMPM production nginx config ──────────────────────────────────────────────
#
# Routes:
#   /mcp              → mmpm-mcp:3001   (MCP Streamable HTTP for Cowork)
#   /health, /ready   → mmpm-service:3000 (public probes)
#   /admin/export     → blocked
#   /*                → mmpm-service:3000 (HTTP API, Bearer auth enforced by app)
#
# TLS via Let's Encrypt (certbot).
# ─────────────────────────────────────────────────────────────────────────────

# HTTP → HTTPS redirect + ACME challenge
server {
    listen 80;
    listen [::]:80;
    server_name mmpm.co.nz;

    # Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name mmpm.co.nz;

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/mmpm.co.nz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mmpm.co.nz/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=15768000" always;

    # ── OAuth metadata + endpoints → mmpm-mcp container ──────────────────────
    location /.well-known/oauth-authorization-server {
        proxy_pass         http://mmpm-mcp:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /oauth/ {
        proxy_pass         http://mmpm-mcp:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── MCP endpoint → mmpm-mcp container ────────────────────────────────────
    # Streamable HTTP transport — needs unbuffered proxying for SSE streams.
    location /mcp {
        proxy_pass         http://mmpm-mcp:3001;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_read_timeout 300s;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Health probes (public, no auth) ──────────────────────────────────────
    location ~ ^/(health|ready)$ {
        proxy_pass http://mmpm-service:3000;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Block /admin/export from external access ─────────────────────────────
    location /admin/export {
        deny all;
    }

    # ── HTTP API → mmpm-service container ────────────────────────────────────
    location / {
        proxy_pass         http://mmpm-service:3000;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_read_timeout 300s;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 16m;
    }

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/mmpm.access.log;
    error_log  /var/log/nginx/mmpm.error.log warn;
}

name: Readiness Fast Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  readiness-fast-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run readiness-focused test suite
        run: npm run test -- src/__tests__/api_ready.test.ts src/__tests__/server.test.ts src/__tests__/ingest_driver.test.ts src/__tests__/recall_bench.test.ts

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Run health-gated API benchmark
        run: npm run bench:ci:api

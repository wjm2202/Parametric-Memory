name: Bench CI API

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  bench-ci-api:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Run health-gated API benchmark
        run: npm run bench:ci:api

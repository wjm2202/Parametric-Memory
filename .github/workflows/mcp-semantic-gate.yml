name: MCP Semantic Gate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  mcp-semantic-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run MCP + semantic API tests
        run: npm test -- src/__tests__/mcp_tools.test.ts src/__tests__/mcp_stdio_integration.test.ts src/__tests__/server.test.ts

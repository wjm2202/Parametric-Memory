# ── MMPM Monitoring Stack ──────────────────────────────────────────────────────
#
# Starts Prometheus + Grafana only.  The MMPM server itself runs directly on
# the host (node dist/server.js) for fast startup — no container overhead.
#
# Usage:
#   # 1. Start the MMPM server as normal (direct, fast):
#   node dist/server.js
#
#   # 2. When you want metrics, start the monitoring stack:
#   docker compose -f docker-compose.monitoring.yml up -d
#
#   # 3. Open Grafana at http://localhost:3001  (login: admin / admin)
#
#   # 4. When done monitoring, tear down cleanly:
#   docker compose -f docker-compose.monitoring.yml down
#
# Prometheus scrapes the host at http://host.docker.internal:3000/metrics.
# On Linux, Docker resolves host.docker.internal via the extra_hosts entry below.
# ─────────────────────────────────────────────────────────────────────────────

services:
  prometheus:
    image: prom/prometheus:latest
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus.monitoring.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - monitoring-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_LOG_FILTERS=context:warn
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-monitoring-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - monitoring-net
    restart: unless-stopped

networks:
  monitoring-net:
    driver: bridge

volumes:
  grafana-monitoring-data:
